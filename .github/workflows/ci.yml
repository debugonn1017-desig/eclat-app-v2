# v0.3.53-B/C: 品質ゲート CI
# 必須チェック: typecheck / 顧客分類の仕様固定テスト / 分類モジュール lint / Hook重要ファイル lint
# 含めないもの: 全体 lint (既存140件のため段階解消中) /
#   build (Supabase 環境変数が必須でダミー秘密情報はコミットしない方針のため。Vercel が担う)

name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Customer category spec tests
        run: npm run test

      - name: Lint (customerCategory module)
        run: npm run lint:category

      - name: Lint (hooks critical files)
        run: npm run lint:hooks-critical
