# v0.3.53-B: 品質ゲート CI
# 必須チェック: typecheck / 顧客分類の仕様固定テスト / 分類モジュールの lint
# 含めないもの: 全体 lint (既存144件のため。次フェーズで段階解消) /
#   build (Supabase 環境変数が必須でダミー秘密情報はコミットしない方針のため。
#   build の検証は Vercel デプロイが担う)

name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Customer category spec tests
        run: npm run test

      - name: Lint (customerCategory module)
        run: npm run lint:category
