<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D9B3A0"/>
      <stop offset="50%" style="stop-color:#C9917A"/>
      <stop offset="100%" style="stop-color:#C4997F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#FFFFFF"/>
  <g transform="translate(256, 248)" fill="none" stroke="url(#rg)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer diamond shape -->
    <path d="M0,-120 L-120,-50 L-75,-50 L0,-120 L75,-50 L120,-50 L0,-120Z"/>
    <path d="M-120,-50 L120,-50"/>
    <path d="M-120,-50 L0,120"/>
    <path d="M120,-50 L0,120"/>
    <!-- Left side facets -->
    <path d="M-75,-50 L-95,10"/>
    <path d="M-75,-50 L-55,25"/>
    <path d="M-120,-50 L-55,25"/>
    <path d="M-95,10 L0,120"/>
    <path d="M-55,25 L0,120"/>
    <!-- Right side facets -->
    <path d="M75,-50 L95,10"/>
    <path d="M75,-50 L55,25"/>
    <path d="M120,-50 L55,25"/>
    <path d="M95,10 L0,120"/>
    <path d="M55,25 L0,120"/>
    <!-- Top facets -->
    <path d="M-40,-80 L-75,-50"/>
    <path d="M40,-80 L75,-50"/>
    <path d="M0,-120 L-40,-80"/>
    <path d="M0,-120 L40,-80"/>
    <!-- Heart shape -->
    <path d="M0,-10 C0,-35 -30,-55 -55,-35 C-75,-18 -70,10 0,55 C70,10 75,-18 55,-35 C30,-55 0,-35 0,-10Z" stroke-width="11"/>
    <!-- Small diamond jewel accents -->
  </g>
  <!-- Jewel dots -->
  <g fill="#FFFFFF" stroke="url(#rg)" stroke-width="2">
    <circle cx="182" cy="198" r="6"/>
    <circle cx="330" cy="198" r="6"/>
    <circle cx="161" cy="258" r="6"/>
    <circle cx="351" cy="258" r="6"/>
    <circle cx="256" cy="330" r="6"/>
  </g>
</svg>
